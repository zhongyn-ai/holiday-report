<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>节假日爆发系数复盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f2f1ee;color:#4a4540;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
h1{font-size:22px;color:#5a4a3a;margin-bottom:6px;text-align:center}
.subtitle{font-size:12px;color:#8a7a6a;margin-bottom:48px;text-align:center}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;width:100%;max-width:800px}
.card{background:#faf9f7;border-radius:10px;padding:28px 24px;border:1px solid rgba(184,164,154,.25);text-decoration:none;color:inherit;transition:all .2s;cursor:pointer;display:flex;flex-direction:column;gap:8px}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(90,74,58,.1);border-color:rgba(184,164,154,.5)}
.card-icon{font-size:28px;margin-bottom:4px}
.card-title{font-size:16px;font-weight:600;color:#5a4a3a}
.card-date{font-size:11px;color:#b8a49a;font-weight:500}
.card-desc{font-size:11px;color:#8a7a6a;line-height:1.6;margin-top:4px}
.card-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-top:6px;font-weight:500}
.tag-done{background:#e8f0e4;color:#5a7850}
.tag-soon{background:#f0ece4;color:#8a7a5a}
.footer{margin-top:48px;font-size:10px;color:#b8a49a;text-align:center}
</style>
</head>
<body>
<h1>节假日爆发系数复盘</h1>
<p class="subtitle">正餐/轻餐/快餐 × 城市线级 × 品类 × 价格带 × 地域</p>

<div class="grid">
  <a class="card" href="cny.html">
    <div class="card-icon">🧧</div>
    <div class="card-title">2026 春节</div>
    <div class="card-date">1/28 小年 — 2/5 初七</div>
    <div class="card-desc">整体爆发系数 · 日度趋势 · 轻餐渠道YoY · 品类×价格带矩阵</div>
    <span class="card-tag tag-done">✓ 已完成</span>
  </a>

  <a class="card" href="qmwy.html">
    <div class="card-icon">🌿</div>
    <div class="card-title">2026 清明 + 五一</div>
    <div class="card-date">4/5–4/7 清明 · 5/1–5/5 五一</div>
    <div class="card-desc">整体爆发系数 · 品类×价格带YoY矩阵 · 品类×地域分布</div>
    <span class="card-tag tag-done">✓ 已完成</span>
  </a>

  <div class="card" style="opacity:.55;cursor:default">
    <div class="card-icon">🐉</div>
    <div class="card-title">2026 端午</div>
    <div class="card-date">待定</div>
    <div class="card-desc">同框架，数据更新后可直接复用</div>
    <span class="card-tag tag-soon">待更新</span>
  </div>

  <div class="card" style="opacity:.55;cursor:default">
    <div class="card-icon">🎑</div>
    <div class="card-title">2026 国庆</div>
    <div class="card-date">待定</div>
    <div class="card-desc">同框架，数据更新后可直接复用</div>
    <span class="card-tag tag-soon">待更新</span>
  </div>
</div>

<div class="footer">数据来源：美团外卖 · 基期=节前普通周 · 爆发系数=假期日均/基期日均</div>
</body>
</html>
